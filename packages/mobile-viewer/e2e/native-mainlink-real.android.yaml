appId: com.deskcontroller.mobileviewer
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: host-input
    timeout: 60000
- tapOn:
    id: host-input
- eraseText
- inputText: ${HOST}
- tapOn:
    id: port-input
- eraseText
- inputText: ${PORT}
- tapOn:
    id: pair-code-input
- eraseText
- inputText: ${PAIR_CODE}
- tapOn:
    id: connect-button
- assertVisible: streaming
- assertVisible:
    id: remote-video
